<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohan Bhowmik - Dev Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Mineral Jewel Tones Palette */
            --bg-midnight: #0a0f1e;
            --text-silver: #e2e8f0;
            --text-muted: #94a3b8;
            
            --gem-amethyst: #a78bfa; 
            --gem-emerald: #34d399;   
            --gem-sapphire: #60a5fa;  
            
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-midnight);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(167, 139, 250, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(52, 211, 153, 0.15) 0%, transparent 40%);
            background-size: 100% 100%;
            animation: backgroundShift 20s ease infinite;

            font-family: 'Poppins', sans-serif;
            color: var(--text-silver);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* --- ANIMATIONS --- */
        @keyframes backgroundShift {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(80px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- CONTAINER & GLASS PANELS --- */
        .portfolio-container {
            width: 100%;
            max-width: 900px;
            z-index: 10;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 50px;
            margin-bottom: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            opacity: 0;
            animation: popIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }
        .delay-4 { animation-delay: 0.7s; }
        .delay-5 { animation-delay: 0.9s; }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            background: linear-gradient(to right, var(--text-silver), var(--gem-sapphire), var(--gem-amethyst));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        h2 {
            font-size: 2rem;
            color: var(--gem-emerald);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
        }

        h3 {
            color: var(--text-silver);
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 25px;
        }

        /* --- HERO SECTION --- */
        .hero-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrapper {
            position: relative;
            margin-bottom: 25px;
            animation: float 5s ease-in-out infinite;
